kind = "mobile"
previewPath = "/"
title = "OilCalc Pro"
version = "1.0.0"
id = "artifacts/oilcalc-pro"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18262

[services.development]
run = "pnpm --filter @workspace/oilcalc-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oilcalc-pro", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/oilcalc-pro", "run", "serve" ]

[services.env]
PORT = "18262"
BASE_PATH = "/"
